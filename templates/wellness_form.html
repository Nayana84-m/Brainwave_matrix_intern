<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Wellness Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e3f2fd;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 450px;
            margin: 50px auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #1976d2;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #90caf9;
            border-radius: 5px;
            margin-top: 5px;
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            cursor: pointer;
        }
        button:hover {
            background: #1565c0;
        }
        .message {
            text-align: center;
            margin-top: 15px;
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>How Are You Today?</h1>
        <form method="POST">
            <label for="name">Name:</label>
            <input type="text" name="name" required>

            <label for="sleep_hours">Hours of Sleep:</label>
            <input type="number" step="0.1" name="sleep_hours" required>

            <label for="feeling">How are you feeling today?</label>
            <select name="feeling" required>
                <option value="">--Select--</option>
                <option value="Very Relaxed">Very Relaxed</option>
                <option value="Relaxed">Relaxed</option>
                <option value="Neutral">Neutral</option>
                <option value="Tired">Tired</option>
                <option value="Stressed">Stressed</option>
                <option value="Very Stressed">Very Stressed</option>
            </select>

            <label for="activity">Activity You Did Today:</label>
            <input type="text" name="activity" required>

            <label for="day">Day of the Week:</label>
            <select name="day" required>
                <option value="">--Select--</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>
            <button type="submit">Submit</button><form method="POST">
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/summary" style="text-decoration: none;">
            <button type="button">View Weekly Summary</button>
            </a>
        </div>
            {% if message %}
         <div class="message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
